name: Update README

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - add
          - remove
          - skip
          - keep
          - move
          - update-desc
          - update-skills
      owner:
        description: 'Repository owner'
        required: true
        type: string
      repo:
        description: 'Repository name'
        required: true
        type: string
      sectionId:
        description: 'Target section ID (for add action)'
        required: false
        type: string
      descriptionKo:
        description: 'Korean description generated by Claude'
        required: false
        type: string
      fromSectionId:
        description: 'Source section ID (for move action)'
        required: false
        type: string
      descriptionJa:
        description: 'Japanese description generated by Claude'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Modify repos.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION: ${{ inputs.action }}
          REPO_OWNER: ${{ inputs.owner }}
          REPO_NAME: ${{ inputs.repo }}
          SECTION_ID: ${{ inputs.sectionId }}
          DESCRIPTION_KO: ${{ inputs.descriptionKo }}
          FROM_SECTION_ID: ${{ inputs.fromSectionId }}
          DESCRIPTION_JA: ${{ inputs.descriptionJa }}
        run: |
          node -e "
          import { readFileSync, writeFileSync } from 'node:fs';
          import { Octokit } from '@octokit/rest';
          import { discoverSkillsInRepo, countTotalSkills } from './scripts/skill-utils.mjs';

          const data = JSON.parse(readFileSync('data/repos.json', 'utf-8'));
          const action = process.env.ACTION;
          const owner = process.env.REPO_OWNER;
          const repo = process.env.REPO_NAME;
          const sectionId = process.env.SECTION_ID;
          const descriptionKo = process.env.DESCRIPTION_KO;
          const descriptionJa = process.env.DESCRIPTION_JA;
          const fromSectionId = process.env.FROM_SECTION_ID;

          // 입력값 검증
          const VALID_NAME = /^[a-zA-Z0-9_.-]+$/;
          if (!VALID_NAME.test(owner) || !VALID_NAME.test(repo)) {
            console.error('Invalid owner/repo:', owner, repo);
            process.exit(1);
          }
          const fullName = owner + '/' + repo;

          if (action === 'add') {
            const section = data.sections.find(s => s.id === sectionId);
            if (!section) { console.error('Section not found:', sectionId); process.exit(1); }

            // Check duplicate
            if (section.repos.some(r => r.owner === owner && r.repo === repo)) {
              console.log('Already exists:', fullName);
              process.exit(0);
            }

            // Fetch repo info
            const octokit = new Octokit({ auth: process.env.GITHUB_TOKEN });
            const { data: ghRepo } = await octokit.rest.repos.get({ owner, repo });

            const descEn = ghRepo.description || '';
            const descKo = descriptionKo || descEn;
            const addedRepo = {
              owner,
              repo,
              type: 'Community',
              addedDate: new Date().toISOString().slice(0, 10),
              description: { ko: descKo, en: descEn, ja: descriptionJa || descEn },
              status: 'active',
              health: {
                stars: ghRepo.stargazers_count,
                starsPrev: ghRepo.stargazers_count,
                archived: ghRepo.archived,
                lastPush: ghRepo.pushed_at,
                exists: true,
              },
            };

            // Auto-discover skills if repo has SKILL.md files
            try {
              const skills = await discoverSkillsInRepo(owner, repo, process.env.GITHUB_TOKEN);
              if (skills.length > 0) {
                addedRepo.skills = skills;
                console.log('Discovered', skills.length, 'skills in', fullName);
              }
            } catch (err) {
              console.log('Skill discovery skipped:', err.message);
            }

            section.repos.push(addedRepo);
            console.log('Added:', fullName, 'to', sectionId, '(ko:', descKo.slice(0, 50), ')');

          } else if (action === 'update-skills') {
            // Refresh skills for a specific repo
            let found = null;
            for (const section of data.sections) {
              found = section.repos.find(r => r.owner === owner && r.repo === repo);
              if (found) break;
            }
            if (!found) { console.log('Not found:', fullName); process.exit(0); }

            try {
              const skills = await discoverSkillsInRepo(owner, repo, process.env.GITHUB_TOKEN);
              found.skills = skills.length > 0 ? skills : undefined;
              console.log('Updated skills for', fullName, ':', skills.length, 'skills');
            } catch (err) {
              console.error('Skill discovery failed:', err.message);
              process.exit(1);
            }

          } else if (action === 'remove') {
            let removed = false;
            for (const section of data.sections) {
              const idx = section.repos.findIndex(r => r.owner === owner && r.repo === repo);
              if (idx !== -1) {
                section.repos.splice(idx, 1);
                removed = true;
                console.log('Removed:', fullName, 'from', section.id);
                break;
              }
            }
            if (!removed) { console.log('Not found:', fullName); process.exit(0); }

          } else if (action === 'move') {
            // Move repo from one section to another
            if (!fromSectionId || !sectionId) {
              console.error('move requires fromSectionId and sectionId');
              process.exit(1);
            }
            const fromSection = data.sections.find(s => s.id === fromSectionId);
            const toSection = data.sections.find(s => s.id === sectionId);
            if (!fromSection || !toSection) {
              console.error('Section not found:', fromSectionId, sectionId);
              process.exit(1);
            }
            const idx = fromSection.repos.findIndex(r => r.owner === owner && r.repo === repo);
            if (idx === -1) {
              console.error('Repo not found in source section:', fullName, fromSectionId);
              process.exit(1);
            }
            const [movedRepo] = fromSection.repos.splice(idx, 1);
            toSection.repos.push(movedRepo);
            console.log('Moved:', fullName, fromSectionId, '->', sectionId);

          } else if (action === 'update-desc') {
            // Update Korean description only
            let updated = false;
            for (const section of data.sections) {
              const found = section.repos.find(r => r.owner === owner && r.repo === repo);
              if (found) {
                found.description.ko = descriptionKo || found.description.ko;
                found.description.ja = descriptionJa || found.description.ja;
                updated = true;
                console.log('Updated description:', fullName, '(ko:', (descriptionKo || '').slice(0, 50), ')');
                break;
              }
            }
            if (!updated) { console.log('Not found:', fullName); process.exit(0); }

          } else if (action === 'skip' || action === 'keep') {
            // Record decision in skipped.json (7-day cooldown)
            let skipped;
            try {
              skipped = JSON.parse(readFileSync('data/skipped.json', 'utf-8'));
            } catch { skipped = { skippedRepos: {} }; }

            skipped.skippedRepos[fullName.toLowerCase()] = {
              action,
              skippedAt: new Date().toISOString(),
              reason: action === 'skip' ? 'User skipped candidate' : 'User kept existing repo',
            };
            writeFileSync('data/skipped.json', JSON.stringify(skipped, null, 2) + '\n');
            console.log(action === 'skip' ? 'Skipped:' : 'Kept:', fullName, '(7-day cooldown)');
            process.exit(0);
          }

          data.metadata.lastUpdated = new Date().toISOString();
          data.metadata.totalEntries = data.sections.reduce((s, sec) => s + sec.repos.length, 0);
          data.metadata.totalSkills = countTotalSkills(data);
          writeFileSync('data/repos.json', JSON.stringify(data, null, 2) + '\n');
          " --input-type=module

      - name: Generate README files
        if: inputs.action == 'add' || inputs.action == 'remove' || inputs.action == 'move' || inputs.action == 'update-desc' || inputs.action == 'update-skills'
        run: node scripts/generate-readme.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/repos.json data/skipped.json README.md README_EN.md README_JA.md
          git diff --staged --quiet && echo "No changes" && exit 0
          ACTION="${{ inputs.action }}"
          FULLNAME="${{ inputs.owner }}/${{ inputs.repo }}"
          if [ "$ACTION" = "add" ]; then
            git commit -m "feat: add ${FULLNAME}"
          elif [ "$ACTION" = "remove" ]; then
            git commit -m "chore: remove ${FULLNAME}"
          elif [ "$ACTION" = "skip" ]; then
            git commit -m "chore: skip ${FULLNAME} (7-day cooldown)"
          elif [ "$ACTION" = "keep" ]; then
            git commit -m "chore: keep ${FULLNAME} (7-day cooldown)"
          elif [ "$ACTION" = "move" ]; then
            git commit -m "refactor: move ${FULLNAME} to ${{ inputs.sectionId }}"
          elif [ "$ACTION" = "update-desc" ]; then
            git commit -m "docs: update description for ${FULLNAME}"
          elif [ "$ACTION" = "update-skills" ]; then
            git commit -m "refactor: update skills for ${FULLNAME}"
          fi
          git pull --rebase origin main
          git push

      - name: Notify and approve
        if: inputs.action == 'add' || inputs.action == 'remove' || inputs.action == 'move' || inputs.action == 'update-desc' || inputs.action == 'update-skills'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VPS_API_URL: ${{ secrets.VPS_API_URL }}
          VPS_API_SECRET: ${{ secrets.VPS_API_SECRET }}
          ACTION: ${{ inputs.action }}
          REPO_OWNER: ${{ inputs.owner }}
          REPO_NAME: ${{ inputs.repo }}
          SECTION_ID: ${{ inputs.sectionId }}
          DESCRIPTION_KO: ${{ inputs.descriptionKo }}
          FROM_SECTION_ID: ${{ inputs.fromSectionId }}
        run: |
          node -e "
          const token = process.env.TELEGRAM_BOT_TOKEN;
          const channelId = process.env.TELEGRAM_CHANNEL_ID;
          const chatId = process.env.TELEGRAM_CHAT_ID;
          const action = process.env.ACTION;
          const owner = process.env.REPO_OWNER;
          const repoName = process.env.REPO_NAME;
          const VALID_NAME = /^[a-zA-Z0-9_.-]+$/;
          if (!VALID_NAME.test(owner) || !VALID_NAME.test(repoName)) { process.exit(0); }
          const fullName = owner + '/' + repoName;
          const section = process.env.SECTION_ID || '';
          const descKo = process.env.DESCRIPTION_KO || '';

          const telegramUrl = 'https://api.telegram.org/bot' + token;
          const sendTelegram = async (to, text, replyMarkup) => {
            const body = { chat_id: to, text };
            if (replyMarkup) body.reply_markup = JSON.stringify(replyMarkup);
            await fetch(telegramUrl + '/sendMessage', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
          };

          // Read repo data from repos.json
          const fs = await import('node:fs');
          let stars = '';
          let desc = descKo;
          let skills = null;
          let skillCount = 0;
          try {
            const data = JSON.parse(fs.readFileSync('data/repos.json', 'utf-8'));
            for (const s of data.sections) {
              const r = s.repos.find(r => r.owner === owner && r.repo === repoName);
              if (r) {
                stars = r.health?.stars || '';
                if (!desc) desc = r.description?.ko || '';
                if (r.skills && r.skills.length > 0) { skills = r.skills; skillCount = r.skills.length; }
                break;
              }
            }
          } catch {}

          if (action === 'add') {
            // --- ADD: VPS approval flow (no channel auto-send) ---
            const vpsUrl = process.env.VPS_API_URL;
            const vpsSecret = process.env.VPS_API_SECRET;

            if (vpsUrl && vpsSecret) {
              const approveUrl = vpsUrl.replace('/api/describe', '/api/approve');
              const repoData = { owner, repo: repoName, sectionId: section, descriptionKo: desc, stars, skills, skillCount };

              try {
                const resp = await fetch(approveUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + vpsSecret },
                  body: JSON.stringify(repoData),
                });
                if (!resp.ok) throw new Error('VPS ' + resp.status);
              } catch (err) {
                console.log('VPS approve failed:', err.message, '— sending fallback DM button');
                if (chatId) {
                  await sendTelegram(chatId, '⚠️ VPS 연결 실패 — 수동 채널 발행 버튼', {
                    inline_keyboard: [[{ text: '채널 발행', callback_data: 'ap:' + fullName }]],
                  });
                }
              }
            } else if (chatId) {
              // No VPS configured — fallback button
              await sendTelegram(chatId, '⚠️ VPS 미설정 — 수동 채널 발행', {
                inline_keyboard: [[{ text: '채널 발행', callback_data: 'ap:' + fullName }]],
              });
            }

            // Admin DM notification
            if (chatId) {
              await sendTelegram(chatId, '✅ ' + fullName + ' 추가 완료 — 채널 메시지 승인 대기');
            }

          } else {
            // --- REMOVE/MOVE/UPDATE-DESC/UPDATE-SKILLS: direct channel send (admin already triggered) ---
            let msg;
            if (action === 'remove') {
              msg = '🗑 Removed: ' + fullName;
            } else if (action === 'move') {
              const fromSec = process.env.FROM_SECTION_ID || '';
              msg = '🔄 Moved: ' + fullName + (fromSec ? ' ' + fromSec + ' → ' : ' → ') + (section || '?');
            } else if (action === 'update-desc') {
              msg = '✏️ Updated: ' + fullName + (desc ? '\\n📝 ' + desc : '');
            } else if (action === 'update-skills') {
              msg = '🔄 Skills updated: ' + fullName + ' (' + skillCount + ' skills)';
            } else {
              process.exit(0);
            }

            const repoUrl = 'https://github.com/' + (process.env.GITHUB_REPOSITORY || 'sumsun-dev/awesome-web3-claude');
            msg += '\\n\\n⭐ ' + repoUrl;

            if (channelId) {
              await sendTelegram(channelId, msg);
            }
            if (chatId) {
              await sendTelegram(chatId, '✅ ' + msg + ' — 완료');
            }
          }
          " --input-type=module
